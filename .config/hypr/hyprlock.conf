general {
    ignore_empty_input = true
    grace = 0
}

# ══════════════════════════════════════════
# FONDO — Screenshot con efecto Sheikah
# ══════════════════════════════════════════
background {
    monitor     =
    path        = screenshot
    blur_passes = 4
    blur_size   = 7
    brightness  = 0.3
    vibrancy    = 0.2
    contrast    = 1.1
    color       = rgba(0a1a1bcc)
}

# ══════════════════════════════════════════
# HEADER — Sistema de autenticación
# ══════════════════════════════════════════
label {
    monitor    =
    text       = ◈  SISTEMA SHEIKAH  ◈
    color      = rgba(00F0FFcc)
    font_size  = 13
    font_family = JetBrainsMono Nerd Font Bold
    position   = 0, 160
    halign     = center
    valign     = center
    shadow_passes = 3
    shadow_size   = 8
    shadow_color  = rgba(00F0FF44)
}

# ══════════════════════════════════════════
# RELOJ PRINCIPAL
# ══════════════════════════════════════════
label {
    monitor     =
    text        = cmd[update:1000] echo "<span>$(date +'%H:%M')</span>"
    color       = rgba(00F0FFff)
    font_size   = 96
    font_family = JetBrainsMono Nerd Font Bold
    position    = 0, 60
    halign      = center
    valign      = center
    shadow_passes = 4
    shadow_size   = 20
    shadow_color  = rgba(00F0FF55)
}

# ══════════════════════════════════════════
# FECHA
# ══════════════════════════════════════════
label {
    monitor     =
    text        = cmd[update:60000] LC_TIME=es_ES.UTF-8 date +'%A, %d de %B'
    color       = rgba(e2e2d7cc)
    font_size   = 16
    font_family = JetBrainsMono Nerd Font
    position    = 0, -20
    halign      = center
    valign      = center
}

# ══════════════════════════════════════════
# USUARIO
# ══════════════════════════════════════════
label {
    monitor     =
    text        =  $USER
    color       = rgba(00F0FFaa)
    font_size   = 14
    font_family = JetBrainsMono Nerd Font Bold
    position    = 0, -100
    halign      = center
    valign      = center
}

# ══════════════════════════════════════════
# INPUT — Campo de contraseña
# ══════════════════════════════════════════
input-field {
    monitor          =
    size             = 300, 52
    outline_thickness = 2
    rounding         = 12

    outer_color      = rgba(00F0FFcc) rgba(0080FFcc) 45deg
    inner_color      = rgba(0a1a1bdd)
    font_color       = rgba(00F0FFff)
    check_color      = rgba(FF7A00ff) rgba(FFaa00ff) 45deg
    fail_color       = rgba(ff3333ff) rgba(ff0000ff) 45deg

    font_family      = JetBrainsMono Nerd Font Bold
    font_size        = 14
    placeholder_text = <i>Introduce clave de acceso...</i>
    fail_text        = <b>⚠ ACCESO DENEGADO — $ATTEMPTS intentos</b>

    dots_size        = 0.25
    dots_spacing     = 0.3
    dots_center      = true

    fade_on_empty    = true
    capslock_color   = rgba(FF7A00ff)

    position         = 0, -170
    halign           = center
    valign           = center
}

# ══════════════════════════════════════════
# FOOTER — Instrucción
# ══════════════════════════════════════════
label {
    monitor     =
    text        = Pulsa ENTER para autenticar
    color       = rgba(e2e2d766)
    font_size   = 11
    font_family = JetBrainsMono Nerd Font
    position    = 0, -230
    halign      = center
    valign      = center
}
